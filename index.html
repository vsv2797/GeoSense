<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoSense | Global Climate Intelligence</title>
  <link rel="stylesheet" href="css/climate.css">
  <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.26.0/dist/globe.gl.min.js"></script>
</head>

<body>
  <div id="earth-glow"></div>

  <header>
    <div class="logo">
      <div class="logo-mark" onclick="window.location.reload()" style="cursor:pointer">GS</div>
      <div>
        <div class="logo-name">Geo<span>Sense</span></div>
        <div class="logo-tag">GLOBAL CLIMATE INTELLIGENCE</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-pill" onclick="window.location.href='climate.html'" style="cursor:pointer">
        <div class="live-dot"></div>
        <span id="country-count">LIVE TELEMETRY · -- REGIONS</span>
      </div>
    </div>
  </header>

  <div id="main">
    <aside id="left">
      <div class="slabel">ANALYTICS ENGINE</div>
      <div id="metric-btns"></div>
      <div class="divider"></div>
      <div class="slabel">CRITICAL IMPACT ZONES</div>
      <div id="top-list"></div>
      <div class="divider" style="margin-top:auto;"></div>
      <div class="dist-wrap" id="dist-stats"></div>
    </aside>

    <main id="globe-wrap">
      <div id="globe-viz"></div>
      <div id="metric-badge">TRACKING: PM2.5</div>
      <div id="legend">
        <span class="leg-lbl">SAFE</span>
        <div class="leg-bar"></div>
        <span class="leg-lbl">HAZARDOUS</span>
      </div>
      <div id="hint">↻ Rotate globe · Scroll to zoom · Click for detail</div>
    </main>

    <aside id="right">
      <div id="right-inner"><div id="detail-content"></div></div>
    </aside>
  </div>

  <script>
    let DATA = [];
    let GEOJSON_DATA = null;
    let curMetric = 'pm2_5';

    const METRICS = [
      { key: 'pm10', label: 'PM10 Pollutants', icon: '🌫️' },
      { key: 'pm2_5', label: 'PM2.5 Particles', icon: '😷' },
      { key: 'co', label: 'Carbon Monoxide', icon: '🚗' },
      { key: 'no2', label: 'Nitrogen Dioxide', icon: '🏭' },
      { key: 'temp', label: 'Temperature Index', icon: '🌡️' }
    ];

    const world = Globe()(document.getElementById('globe-viz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .backgroundColor('#020408')
      .showAtmosphere(true)
      .atmosphereColor('lightskyblue')
      .atmosphereAltitude(0.15)
      .polygonCapColor(feat => {
        const c = DATA.find(x => x.iso === feat.properties.ISO_A3);
        if (!c) return 'rgba(2, 4, 8, 0.2)';
        const val = c.scores[curMetric] || 0;
        if (curMetric === 'temp') {
            // High-fidelity thermal gradient for Temperature Choropleth
            let t = (val + 30) / 80;
            t = Math.max(0, Math.min(1, t));
            const colors = [[139, 92, 246], [59, 130, 246], [16, 185, 129], [245, 158, 11], [239, 68, 68]];
            const i = Math.floor(t * 4);
            const frac = (t * 4) - i;
            if (i >= 4) return `rgba(239, 68, 68, 0.7)`;
            const r = Math.round(colors[i][0] * (1-frac) + colors[i+1][0] * frac);
            const g = Math.round(colors[i][1] * (1-frac) + colors[i+1][1] * frac);
            const b = Math.round(colors[i][2] * (1-frac) + colors[i+1][2] * frac);
            return `rgba(${r}, ${g}, ${b}, 0.7)`;
        }
        
        // Dynamic scoring for air quality metrics
        const colors = ['#64748b', '#10b981', '#f59e0b', '#ef4444'];
        let ci = 0;
        if (val >= 20) ci = 1;
        if (val >= 50) ci = 2;
        if (val >= 80) ci = 3;
        return colors[ci] + 'a0';
      })
      .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.1)')
      .polygonAltitude(0.012)
      .onPolygonClick(f => {
        const c = DATA.find(x => x.iso === f.properties.ISO_A3);
        if (c) openDetail(c);
      });

    // Cloud layer
    const CLOUDS_IMG_URL = 'https://unpkg.com/three-globe/example/img/earth-clouds.png';
    const CLOUDS_ALT = 0.004;
    const CLOUDS_ROTATION_SPEED = -0.006; 

    new THREE.TextureLoader().load(CLOUDS_IMG_URL, cloudsTexture => {
      const clouds = new THREE.Mesh(
        new THREE.SphereGeometry(world.getGlobeRadius() * (1 + CLOUDS_ALT), 75, 75),
        new THREE.MeshPhongMaterial({ map: cloudsTexture, transparent: true, opacity: 0.8 })
      );
      world.scene().add(clouds);
      (function rotateClouds() {
        clouds.rotation.y += CLOUDS_ROTATION_SPEED * Math.PI / 180;
        requestAnimationFrame(rotateClouds);
      })();
    });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    fetch('https://unpkg.com/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson').then(r => r.json()).then(geojson => {
      GEOJSON_DATA = geojson;
      geojson.features.forEach(f => {
        DATA.push({
          iso: f.properties.ISO_A3,
          name: f.properties.ADMIN,
          lat: f.properties.LABEL_Y,
          lng: f.properties.LABEL_X,
          synced: false,
          scores: { pm10: 0, pm2_5: 0, co: 0, no2: 0, temp: 0 }
        });
      });

      world.polygonsData(geojson.features);
      buildUI();

      // Real-Time Global Synchronization Engine
      const chunkSize = 50;
      for (let i = 0; i < DATA.length; i += chunkSize) {
        const chunk = DATA.slice(i, i + chunkSize);
        const lats = chunk.map(c => parseFloat(c.lat).toFixed(2)).join(',');
        const lngs = chunk.map(c => parseFloat(c.lng).toFixed(2)).join(',');
        
        Promise.all([
          fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lats}&longitude=${lngs}&current=pm10,pm2_5,carbon_monoxide,nitrogen_dioxide`),
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lngs}&current=temperature_2m`)
        ]).then(resps => Promise.all(resps.map(r => r.json())))
          .then(([aq, tmp]) => {
             const aqR = Array.isArray(aq) ? aq : [aq];
             const tmpR = Array.isArray(tmp) ? tmp : [tmp];
             chunk.forEach((c, idx) => {
                if (aqR[idx]?.current) {
                    c.scores.pm10 = Math.round(aqR[idx].current.pm10 || 0);
                    c.scores.pm2_5 = Math.round(aqR[idx].current.pm2_5 || 0);
                    c.scores.co = Math.round(aqR[idx].current.carbon_monoxide || 0);
                    c.scores.no2 = Math.round(aqR[idx].current.nitrogen_dioxide || 0);
                }
                if (tmpR[idx]?.current) {
                    c.scores.temp = Math.round(tmpR[idx].current.temperature_2m || 0);
                }
                c.synced = true;
             });
             buildUI();
             world.polygonCapColor(world.polygonCapColor());
          }).catch(err => console.error("Index Batch err", err));
      }
    });

    function buildUI() {
        const mBtns = document.getElementById('metric-btns');
        if (!mBtns) return;
        mBtns.innerHTML = '';
        METRICS.forEach(m => {
            const btn = document.createElement('div');
            btn.className = `metric-btn ${curMetric === m.key ? 'active' : ''}`;
            btn.onclick = () => selectMetric(m.key);
            btn.innerHTML = `<div class="btn-title">${m.icon} ${m.label}</div><div class="btn-value">${curMetric === m.key ? 'UP-TO-DATE' : 'STANDBY'}</div>`;
            mBtns.appendChild(btn);
        });

        const topList = document.getElementById('top-list');
        if (!topList) return;
        topList.innerHTML = '';
        [...DATA].filter(x => x.synced).sort((a,b) => b.scores[curMetric] - a.scores[curMetric]).slice(0, 5).forEach(c => {
            const item = document.createElement('div');
            item.className = 'leader-item';
            item.style.borderLeftColor = '#00e5ff';
            item.onclick = () => openDetail(c);
            item.innerHTML = `<div class="leader-content"><div class="leader-country"><span class="leader-flag">${c.iso}</span> ${c.name}</div><div class="leader-score">${c.scores[curMetric]}</div></div>`;
            topList.appendChild(item);
        });

        const cc = document.getElementById('country-count');
        const syncCount = DATA.filter(x => x.synced).length;
        if (cc) cc.textContent = `LIVE TELEMETRY · ${syncCount} / ${DATA.length} REGIONS SYNCED`;
    }

    function selectMetric(key) {
        curMetric = key;
        const mb = document.getElementById('metric-badge');
        if (mb) mb.textContent = `TRACKING: ${METRICS.find(m => m.key === key).label.toUpperCase()}`;
        buildUI();
        world.polygonCapColor(world.polygonCapColor());
    }

    function openDetail(c) {
        document.getElementById('detail-content').innerHTML = `<div class="det-name">${c.name}</div><div class="det-iso">${c.iso}</div><button onclick="closeDetail()">CLOSE</button>`;
        document.getElementById('right').classList.add('active');
        world.controls().autoRotate = false;
    }
    function closeDetail() {
        document.getElementById('right').classList.remove('active');
        world.controls().autoRotate = true;
    }
    window.addEventListener('resize', () => {
      const wrap = document.getElementById('globe-wrap');
      world.width(wrap.offsetWidth).height(wrap.offsetHeight);
    });
    setTimeout(() => {
      const wrap = document.getElementById('globe-wrap');
      world.width(wrap.offsetWidth).height(wrap.offsetHeight);
    }, 500);
  </script>
</body>
</html>
